<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>json 1</title>
</head>
<body>
    <div id="uni">
        <table id="tb">

        </table>
    </div>
    <script>
        var seoulCollege = new Array(50);   // 서울
        var ggCollege = new Array(50);      // 경기도
        var gsCollege = new Array(50);      // 경상도
        var jlCollege = new Array(50);      // 전라도
        var gwCollege = new Array(50);      // 강원도
        var ccCollege = new Array(50);      // 충청도
        var metroCollege = new Array(50);   // 광역시
        var allCollege = new Array(400);    // 전체 대학 총괄
        
        var allCounter = 0;

        var Seoulrequest;
        var Metrorequest;
        var seoulListURL="https://leonld94.github.io/University_File/Seoul_Universities.json";
        var metroListURL="https://leonld94.github.io/University_File/Metro_Universities.json";

        function seoulFill(json){
            var i, end;
            end = json.universities.length;
            for(i=0; i < end; i++, allCounter++){
                seoulCollege[i]=json.universities[i];
                allCollege[allCounter]=json.universities[i];
            }
        }
        function metroFill(json){
            var i, end;
            end = json.universities.length;
            for(i=0; i < end; i++, allCounter++){
                metroCollege[i]=json.universities[i];
                allCollege[allCounter]=json.universities[i];
            }
        }

        function fillTable(){
            var iter,end;
            end=allCounter;
            for(iter=0;iter < end; iter++){
                var newchild = document.createElement('tr');

                var loc = document.createElement('td');
                loc.innerHTML=allCollege[iter].location;
                newchild.appendChild(loc);

                var name = document.createElement('td');
                name.innerHTML=allCollege[iter].college_name;
                newchild.appendChild(name);
                
                var early = document.createElement('td');
                //early.innerHTML=allCollege[iter].early_link;
                if(allCollege[iter].early_link == "")
                    early.innerHTML="-";
                else 
                    early.innerHTML="<a href='"+allCollege[iter].early_link+"' target='_blank'>바로가기</a>";
                newchild.appendChild(early);
                
                var regular = document.createElement('td');
                //regular.innerHTML = allCollege[iter].regular_link;
                if(allCollege[iter].regular_link == "")
                    regular.innerHTML="-";
                else
                    regular.innerHTML="<a href='"+allCollege[iter].regular_link+"' target='_blank'>바로가기</a>";
                newchild.appendChild(regular);

                document.getElementById("tb").appendChild(newchild);
            }
        }


        Seoulrequest = new XMLHttpRequest();
        Seoulrequest.open('Get',seoulListURL);
        Seoulrequest.responseType = 'json';
        Seoulrequest.send();
        Seoulrequest.onload = function() {
            seoulFill(Seoulrequest.response);
        }

        Metrorequest = new XMLHttpRequest();
        Metrorequest.open('Get',metroListURL);
        Metrorequest.responseType = 'json';
        Metrorequest.send();
        Metrorequest.onload = function() {
            metroFill(Metrorequest.response);
            fillTable();
        } 
    </script>
</body>
</html>
